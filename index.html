<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<style>
body { background: #111; color: white; font-family: Arial; padding: 20px; }
.wrap { position:relative; overflow:hidden; width:300px; height:280px; background:#333; border-radius:8px; }
.track { display:flex; transition:transform 0.4s; height:100%; width:300%; }
.slide { flex-shrink:0; width:33.333%; height:100%; overflow:hidden; }
.slide img { width:100%; height:100%; object-fit:cover; display:block; }
button { margin:10px; padding:8px 16px; cursor:pointer; background:#d4a017; border:none; border-radius:4px; }
</style>
</head>
<body>
<h3>Test Slider</h3>
<div class="wrap">
  <div class="track" id="track">
    <div class="slide"><img src="https://i.ibb.co/PZ59DR87/20.jpg" onerror="this.style.background='red'"></div>
    <div class="slide"><img src="https://via.placeholder.com/300x280/ff0000/fff?text=IMG+2"></div>
    <div class="slide"><img src="https://via.placeholder.com/300x280/0000ff/fff?text=IMG+3"></div>
  </div>
</div>
<div>
  <button onclick="go(0)">صورة 1</button>
  <button onclick="go(1)">صورة 2</button>
  <button onclick="go(2)">صورة 3</button>
</div>
<div id="log" style="margin-top:10px;color:#aaa;font-size:0.8rem;"></div>
<script>
let cur = 0;
const n = 3;
function go(i) {
  cur = i;
  const track = document.getElementById('track');
  // RTL: move right = positive translateX
  const pct = (i / n) * 100;
  track.style.transform = `translateX(${pct}%)`;
  document.getElementById('log').textContent = `Slide ${i} → translateX(${pct}%)`;
}
</script>
</body>
</html>
