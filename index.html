<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<style>
body { background: #111; color: white; font-family: Arial; padding: 20px; }
.product-img-wrap { position:relative; overflow:hidden; width:300px; height:280px; background:#333; border-radius:8px; }
.track { display:flex; transition:transform 0.4s; height:100%; direction:ltr; }
.slide { flex-shrink:0; height:280px; overflow:hidden; }
.slide img { width:100%; height:100%; object-fit:cover; display:block; }
button { margin:10px; padding:8px 16px; cursor:pointer; }
</style>
</head>
<body>
<h3>Test - 3 images</h3>
<div class="product-img-wrap">
  <div class="track" id="track" style="width:300%">
    <div class="slide" style="width:33.333%">
      <img src="https://i.ibb.co/PZ59DR87/20.jpg">
    </div>
    <div class="slide" style="width:33.333%">
      <img src="https://via.placeholder.com/300x280/ff0000/fff?text=IMG+2">
    </div>
    <div class="slide" style="width:33.333%">
      <img src="https://via.placeholder.com/300x280/0000ff/fff?text=IMG+3">
    </div>
  </div>
</div>
<div>
  <button onclick="go(0)">1</button>
  <button onclick="go(1)">2</button>
  <button onclick="go(2)">3</button>
</div>
<script>
function go(i) {
  const track = document.getElementById('track');
  const n = 3;
  track.style.transform = `translateX(-${(i/n)*100}%)`;
  console.log('Going to', i, 'transform:', track.style.transform);
}
</script>
</body>
</html>
